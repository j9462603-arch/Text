<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحدي بوابة الحروف الذكي</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Cairo', sans-serif;
            background: radial-gradient(circle at center, #1a1a2e 0%, #0f0f1a 100%);
            color: white;
            margin: 0;
            overflow-x: hidden;
            min-height: 100vh;
        }

        .hex-path {
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
        }

        .glass-effect {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .glow-blue { box-shadow: 0 0 20px rgba(59, 130, 246, 0.5); }
        .glow-red { box-shadow: 0 0 20px rgba(239, 68, 68, 0.5); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { motion, AnimatePresence } = FramerMotion;

        const LETTERS = "أبتثجحخدذرزسشصضطظعغفقكلمنهوي".split("");
        
        const QUESTIONS = {
            'أ': "ما هو أول حرف في الأبجدية؟",
            'ب': "كوكب يلقب بالكوكب الأحمر؟",
            'ت': "ما هي عاصمة اليابان؟",
            'ث': "حيوان يلقب بـ 'مكر الثعلب'؟",
            'ج': "أكبر قارة في العالم من حيث المساحة؟",
            'ح': "طائر يضرب به المثل في حدة البصر؟",
            'خ': "مادة تستخرج من الأشجار لصناعة الورق؟",
            'د': "دولة عربية عاصمتها الدوحة؟",
            'ذ': "ما هو الذهب الأسود؟",
            'ر': "ركن من أركان الإسلام يأتي بعد الصلاة؟",
            'ز': "كوكب يمتلك حلقات واضحة حوله؟",
            'س': "ما هي عاصمة المملكة العربية السعودية؟",
            'ش': "نجم يمد الأرض بالحرارة والضوء؟",
            'ص': "عاصمة مصر؟",
            'ض': "اللغة التي تسمى لغة الـ...؟",
            'ط': "أسرع حيوان بري في العالم؟",
            'ظ': "وقت يختفي فيه الظل تقريباً؟",
            'ع': "عملة الاتحاد الأوروبي؟",
            'غ': "أكبر المحيطات في العالم؟",
            'ف': "حيوان له خرطوم طويل؟",
            'ق': "القارة التي تقع فيها فرنسا؟",
            'ك': "ما هو العنصر الأساسي في تركيب الألماس؟",
            'ل': "حيوان يلقب بملك الغابة؟",
            'م': "أقرب كوكب للشمس؟",
            'ن': "ما هو النهر الذي يمر في مصر؟",
            'ه': "أعلى قمة جبلية في العالم؟",
            'و': "ما هي عاصمة الولايات المتحدة؟",
            'ي': "اليوم الذي يأتي بعد يوم الجمعة؟"
        };

        const App = () => {
            const [gameState, setGameState] = useState('start'); // start, playing, result
            const [grid, setGrid] = useState([]);
            const [activeId, setActiveId] = useState(null);
            const [scores, setScores] = useState({ blue: 0, red: 0 });
            const [timer, setTimer] = useState(20);
            const [isTimerRunning, setIsTimerRunning] = useState(false);

            const startGame = () => {
                const newGrid = LETTERS.map((l, i) => ({ id: i, char: l, owner: null }));
                setGrid(newGrid);
                setScores({ blue: 0, red: 0 });
                setGameState('playing');
            };

            useEffect(() => {
                let interval;
                if (isTimerRunning && timer > 0) {
                    interval = setInterval(() => setTimer(t => t - 1), 1000);
                } else if (timer === 0) {
                    setIsTimerRunning(false);
                }
                return () => clearInterval(interval);
            }, [isTimerRunning, timer]);

            const selectLetter = (id) => {
                if (grid[id].owner) return;
                setActiveId(id);
                setTimer(20);
                setIsTimerRunning(true);
            };

            const claimLetter = (team) => {
                const newGrid = [...grid];
                newGrid[activeId].owner = team;
                setGrid(newGrid);
                setScores(prev => ({ ...prev, [team]: prev[team] + 1 }));
                setActiveId(null);
                setIsTimerRunning(false);

                if (newGrid.every(cell => cell.owner !== null)) {
                    setGameState('result');
                }
            };

            return (
                <div className="container mx-auto max-w-5xl px-4 py-8 min-h-screen flex flex-col items-center justify-center">
                    
                    <AnimatePresence mode="wait">
                        {gameState === 'start' && (
                            <motion.div 
                                initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0 }}
                                className="text-center"
                            >
                                <h1 className="text-6xl font-black mb-8 text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500">
                                    بوابة الحروف
                                </h1>
                                <button 
                                    onClick={startGame}
                                    className="bg-white text-indigo-900 px-10 py-4 rounded-full font-bold text-2xl hover:bg-opacity-90 transition-all shadow-xl"
                                >
                                    ابدأ التحدي
                                </button>
                            </motion.div>
                        )}

                        {gameState === 'playing' && (
                            <motion.div 
                                initial={{ opacity: 0 }} animate={{ opacity: 1 }}
                                className="w-full grid grid-cols-1 lg:grid-cols-12 gap-8 items-start"
                            >
                                {/* لوحة النتائج */}
                                <div className="lg:col-span-3 flex lg:flex-col gap-4 justify-between order-2 lg:order-1">
                                    <div className="glass-effect p-6 rounded-3xl text-center flex-1 border-b-4 border-blue-500 shadow-lg">
                                        <div className="text-blue-400 font-bold mb-2">الفريق الأزرق</div>
                                        <div className="text-5xl font-black">{scores.blue}</div>
                                    </div>
                                    <div className="glass-effect p-6 rounded-3xl text-center flex-1 border-b-4 border-red-500 shadow-lg">
                                        <div className="text-red-400 font-bold mb-2">الفريق الأحمر</div>
                                        <div className="text-5xl font-black">{scores.red}</div>
                                    </div>
                                </div>

                                {/* خلية النحل (الشبكة) */}
                                <div className="lg:col-span-6 flex justify-center order-1 lg:order-2">
                                    <div className="grid grid-cols-5 gap-3 p-4 glass-effect rounded-[2rem]">
                                        {grid.slice(0, 25).map((item, idx) => (
                                            <motion.button
                                                key={item.id}
                                                whileHover={{ scale: 1.1 }}
                                                whileTap={{ scale: 0.9 }}
                                                onClick={() => selectLetter(item.id)}
                                                className={`w-14 h-16 hex-path flex items-center justify-center text-xl font-black transition-all
                                                    ${item.owner === 'blue' ? 'bg-blue-600 glow-blue' : 
                                                      item.owner === 'red' ? 'bg-red-600 glow-red' : 
                                                      activeId === item.id ? 'bg-yellow-400 text-black scale-110' : 'bg-gray-700 hover:bg-gray-600'}`}
                                            >
                                                {item.char}
                                            </motion.button>
                                        ))}
                                    </div>
                                </div>

                                {/* منطقة السؤال */}
                                <div className="lg:col-span-3 order-3">
                                    <div className="glass-effect p-6 rounded-3xl min-h-[300px] flex flex-col justify-between">
                                        {activeId !== null ? (
                                            <div className="text-center">
                                                <div className="w-16 h-16 bg-yellow-400 text-black rounded-2xl flex items-center justify-center text-3xl font-black mx-auto mb-4 shadow-lg">
                                                    {grid[activeId].char}
                                                </div>
                                                <p className="text-xl font-bold mb-6 leading-relaxed">
                                                    {QUESTIONS[grid[activeId].char]}
                                                </p>
                                                <div className={`text-4xl font-mono mb-6 ${timer < 5 ? 'text-red-500 animate-pulse' : 'text-green-400'}`}>
                                                    00:{timer < 10 ? `0${timer}` : timer}
                                                </div>
                                                <div className="grid grid-cols-1 gap-3">
                                                    <button onClick={() => claimLetter('blue')} className="bg-blue-600 py-3 rounded-xl font-bold hover:bg-blue-500">تمت الإجابة (أزرق)</button>
                                                    <button onClick={() => claimLetter('red')} className="bg-red-600 py-3 rounded-xl font-bold hover:bg-red-500">تمت الإجابة (أحمر)</button>
                                                    <button onClick={() => setActiveId(null)} className="text-gray-400 text-sm underline mt-2">إلغاء</button>
                                                </div>
                                            </div>
                                        ) : (
                                            <div className="text-center text-gray-400 mt-20">
                                                <p>اختر حرفاً لبدء السؤال</p>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </motion.div>
                        )}

                        {gameState === 'result' && (
                            <motion.div 
                                initial={{ scale: 0.8 }} animate={{ scale: 1 }}
                                className="text-center glass-effect p-12 rounded-[3rem]"
                            >
                                <h2 className="text-4xl font-bold mb-4">انتهت اللعبة!</h2>
                                <div className="text-6xl font-black mb-8">
                                    {scores.blue > scores.red ? (
                                        <span className="text-blue-400">الفريق الأزرق فاز! 🏆</span>
                                    ) : scores.red > scores.blue ? (
                                        <span className="text-red-400">الفريق الأحمر فاز! 🏆</span>
                                    ) : "تعادل! 🤝"}
                                </div>
                                <button 
                                    onClick={() => setGameState('start')}
                                    className="bg-white text-black px-8 py-3 rounded-full font-bold"
                                >
                                    العودة للرئيسية
                                </button>
                            </motion.div>
                        )}
                    </AnimatePresence>

                    {/* تذييل الصفحة */}
                    <footer className="fixed bottom-4 text-gray-500 text-sm">
                        تحدي المعلومات - نسخة React المطورة
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
