<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>كاشف البيانات</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #f0f0f0; }
        .info-box { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); display: inline-block; }
        .highlight { color: #e74c3c; font-weight: bold; }
    </style>
</head>
<body>

<div class="info-box">
    <h2>بيانات الزائر</h2>
    <p>نوع جهازك: <span id="device" class="highlight">جاري الفحص...</span></p>
    <p>موقعك الجغرافي: <span id="location" class="highlight">في انتظار الإذن...</span></p>
</div>

<script>
    // 1. كشف نوع الجهاز ونظام التشغيل
    function detectDevice() {
        const ua = navigator.userAgent;
        let deviceType = "غير معروف";

        if (/iPad|iPhone|iPod/.test(ua)) {
            deviceType = "جهاز iOS (iPhone/iPad)";
        } else if (/Android/.test(ua)) {
            deviceType = "جهاز أندرويد";
        } else if (/Windows/.test(ua)) {
            deviceType = "كمبيوتر (Windows)";
        } else if (/Macintosh/.test(ua)) {
            deviceType = "كمبيوتر (Mac)";
        }
        
        document.getElementById('device').innerText = deviceType;
    }

    // 2. كشف الموقع الجغرافي (يتطلب موافقة المستخدم)
    function getLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(showPosition, showError);
        } else {
            document.getElementById('location').innerText = "المتصفح لا يدعم تحديد الموقع.";
        }
    }

    function showPosition(position) {
        const lat = position.coords.latitude;
        const lon = position.coords.longitude;
        document.getElementById('location').innerText = `خط عرض: ${lat}, خط طول: ${lon}`;
        // ملاحظة: يمكنك استخدام هذه الإحداثيات مع خرائط جوجل لاحقاً
    }

    function showError(error) {
        switch(error.code) {
            case error.PERMISSION_DENIED:
                document.getElementById('location').innerText = "رفض المستخدم مشاركة الموقع.";
                break;
            case error.POSITION_UNAVAILABLE:
                document.getElementById('location').innerText = "معلومات الموقع غير متوفرة.";
                break;
            default:
                document.getElementById('location').innerText = "حدث خطأ غير معروف.";
        }
    }

    // تشغيل الفحص عند دخول الموقع
    window.onload = function() {
        detectDevice();
        getLocation();
    };
</script>

</body>
</html>
