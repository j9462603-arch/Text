<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقعي الذكي - حروف وعزيز</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0f172a; color: white; text-align: center; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: #1e293b; padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        h1 { color: #6366f1; }
        textarea { width: 90%; height: 100px; padding: 15px; border-radius: 10px; border: none; margin-bottom: 20px; font-size: 16px; background: #334155; color: white; }
        button { background: #6366f1; color: white; border: none; padding: 12px 30px; border-radius: 8px; cursor: pointer; font-size: 18px; font-weight: bold; width: 100%; transition: 0.3s; }
        button:hover { background: #4f46e5; }
        #result-box { margin-top: 30px; padding: 20px; background: #0f172a; border-radius: 10px; min-height: 50px; text-align: right; line-height: 1.6; border-right: 5px solid #6366f1; }
        .loading { color: #f59e0b; font-style: italic; }
    </style>
</head>
<body>

    <div class="container">
        <h1>مساعدك الذكي 🤖</h1>
        <p>اكتب أي شيء (مقالة، كود، نكتة) وسأقوم بتوليده لك:</p>
        
        <textarea id="user-prompt" placeholder="مثلاً: اكتب لي مقالة عن تطور الألعاب..."></textarea>
        
        <button onclick="generateAIContent()">إرسال للذكاء الاصطناعي ✨</button>

        <div id="result-box">
            <div id="result-text">النتيجة ستظهر هنا...</div>
        </div>
    </div>

    <script>
        async function generateAIContent() {
            const prompt = document.getElementById('user-prompt').value;
            const resultDisplay = document.getElementById('result-text');
            
‎            // --- مـهـم جـداً ---
‎            // استبدل المفتاح أدناه بمفتاح الـ API الخاص بك من OpenAI
            const apiKey = "1dda8d7b-4dde-4627-98b7-126cd552ce2d 

            if (!prompt) {
                alert("يا منور الموقع، اكتب سؤالك أولاً!");
                return;
            }

            resultDisplay.innerHTML = '<span class="loading">جاري التفكير... انتظر قليلاً 🧠⏳</span>';

            try {
                const response = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: "gpt-3.5-turbo",
                        messages: [{ role: "user", content: prompt }],
                        temperature: 0.7
                    })
                });

                const data = await response.json();
                
                if (data.choices && data.choices[0]) {
                    const aiResponse = data.choices[0].message.content;
‎                    // تحويل السطور الجديدة إلى بريكات HTML ليظهر النص مرتباً
                    resultDisplay.innerText = aiResponse;
                } else {
                    resultDisplay.innerText = "خطأ: تأكد من صحة مفتاح الـ API أو رصيد الحساب.";
                }

            } catch (error) {
                console.error("Error:", error);
                resultDisplay.innerText = "حدث خطأ في الاتصال بالسيرفر. حاول مرة أخرى.";
            }
        }
    </script>

</body>
</html>
